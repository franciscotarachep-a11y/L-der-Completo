<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Liderland</title>

<style>
body {
  margin:0;
  font-family: Arial, sans-serif;
  background:#f5f5f5;
}

.container {
  max-width:500px;
  margin:50px auto;
  background:#fff;
  padding:30px;
  border-radius:12px;
  text-align:center;
  box-shadow:0 5px 20px rgba(0,0,0,0.1);
}

h1 {
  color:#000;
}

p {
  color:#555;
}

input {
  width:100%;
  padding:12px;
  margin:10px 0;
  border-radius:8px;
  border:1px solid #ccc;
}

button {
  width:100%;
  padding:14px;
  background:#000;
  color:#fff;
  border:none;
  border-radius:8px;
  font-weight:bold;
  cursor:pointer;
}

button:hover {
  opacity:0.9;
}

/* MODAL */
#modal {
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.7);
  justify-content:center;
  align-items:center;
}

.modal-box {
  background:#fff;
  padding:30px;
  border-radius:12px;
  max-width:400px;
  text-align:center;
  animation:fadeIn 0.3s ease;
}

.whatsapp {
  display:inline-block;
  margin-top:15px;
  padding:12px 20px;
  background:#25D366;
  color:#fff;
  text-decoration:none;
  border-radius:8px;
  font-weight:bold;
}

@keyframes fadeIn {
  from {opacity:0; transform:scale(0.9);}
  to {opacity:1; transform:scale(1);}
}
</style>

</head>
<body>

<div class="container">
  <h1>Baixe seu eBook gratuito</h1>
  <p>Preencha os dados abaixo para liberar seu acesso</p>

  <form onsubmit="event.preventDefault(); abrirModal();">
    <input type="text" placeholder="Seu nome" required>
    <input type="email" placeholder="Seu email" required>
    <button type="submit">Quero meu eBook</button>
  </form>
</div>

<!-- MODAL -->
<div id="modal">
  <div class="modal-box">
    <h2>⚠️ Último passo!</h2>

    <p>
      Seu eBook está pronto!<br><br>
      Para receber, você precisa confirmar suas informações pelo WhatsApp.
    </p>

    <a href="https://wa.me/5519999019540" target="_blank" class="whatsapp">
      Confirmar no WhatsApp
    </a>

    <br><br>

    <button onclick="fecharModal()">Fechar</button>
  </div>
</div>

<script>
function abrirModal() {
  document.getElementById("modal").style.display = "flex";
}

function fecharModal() {
  document.getElementById("modal").style.display = "none";
}
</script>

</body>
</html>
